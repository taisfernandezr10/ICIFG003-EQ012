<div class="container mt-5">

  <div
    class="d-flex justify-content-between align-items-center mb-4"
  >

    <h1 class="fw-bold page-title">

      Gestión de Cursos

    </h1>

    <button
      class="btn btn-success"
      (click)="abrirFormulario()"
    >

      Nuevo Curso

    </button>

  </div>

  @if (mostrarFormulario()) {

    <div class="card shadow-sm mb-4">

      <div class="card-body">

        <h4 class="mb-4">

          @if (modoEdicion()) {

            Editar Curso

          } @else {

            Nuevo Curso

          }

        </h4>

        <div class="row">

          <div class="col-md-4 mb-3">

            <label class="form-label">

              Nombre Curso

            </label>

            <input
              type="text"
              class="form-control"
              placeholder="Ej: 1ero A, 2do B"
              [(ngModel)]="nuevoCurso().nombreCurso"
            >

          </div>

          <div class="col-md-4 mb-3">

            <label class="form-label">

              Nivel

            </label>

            <select
                 class="form-select"
                [(ngModel)]="nuevoCurso().nivel"
            >

                 <option value="">

                    Seleccione nivel

                </option>

                <option value="Básico">

                    Básico

                </option>

                <option value="Medio">

                    Medio

                </option>

            </select>

          </div>

          <div class="col-md-4 mb-3">

            <label class="form-label">

              Año Académico

            </label>

            <input
              type="number"
              class="form-control"
              [(ngModel)]="nuevoCurso().anioAcademico"
            >

          </div>

        </div>

        <div class="d-flex gap-2">

          <button
            class="btn btn-primary"
            (click)="guardarCurso()"
          >

            Guardar

          </button>

          <button
            class="btn btn-secondary"
            (click)="cerrarFormulario()"
          >

            Cancelar

          </button>

        </div>

      </div>

    </div>

  }

  <div class="card shadow-sm">

    <div class="card-body">

      <table class="table table-hover">

        <thead class="table-primary">

          <tr>

            <th>ID</th>
            <th>Nombre Curso</th>
            <th>Nivel</th>
            <th>Año</th>
            <th>Acciones</th>

          </tr>

        </thead>

        <tbody>

          @for (
            curso of cursos();
            track curso.id
          ) {

            <tr>

              <td>{{ curso.id }}</td>

              <td>{{ curso.nombreCurso }}</td>

              <td>{{ curso.nivel }}</td>

              <td>{{ curso.anioAcademico }}</td>

              <td>

                <button
                  class="btn btn-warning btn-sm me-2"
                  (click)="editarCurso(curso)"
                >

                  Editar

                </button>

                <button
                  class="btn btn-danger btn-sm"
                  (click)="eliminarCurso(curso.id!)"
                >

                  Eliminar

                </button>

              </td>

            </tr>

          }

        </tbody>

      </table>

    </div>

  </div>

</div>
