<div class="login-page">

  <div class="login-overlay"></div>

  <div class="login-card">

    <img
      src="logo.PNG"
      alt="Logo Colegio"
      class="login-logo"
    >

    <h1>
      Bienvenido
    </h1>

    <p>
      Accede al sistema administrativo escolar
    </p>

    <form>

      <div class="input-group">

        <label>
          Usuario
        </label>

        <input
          type="text"
          placeholder="Ingrese usuario"
        >

      </div>

      <div class="input-group">

        <label>
          Contraseña
        </label>

        <input
          type="password"
          placeholder="Ingrese contraseña"
        >

      </div>

      <button type="submit">
        Iniciar Sesión
      </button>

    </form>

    <a
      routerLink="/"
      class="back-link"
    >
      Volver al inicio
    </a>

  </div>

</div>
